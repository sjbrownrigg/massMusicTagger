# discogstagger3 вҖ” character substitution profiles
#
# Select a profile by setting char_profile in the [details] section of your
# config file, e.g.:
#
#   [details]
#   char_profile = linux
#
# Substitutions are applied to the name part of generated filenames in the
# order listed, before the core invalid-character strip (which only removes
# / and control characters on Linux).  An empty value removes the character.
#
# The [character_exceptions] section in your .conf file is applied on top of
# the YAML profile, so you can still use INI overrides for individual tweaks.
#
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Choosing a profile
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
#
#  linux        No substitutions вҖ” preserve everything the filesystem allows.
#               Only / and control characters are ever removed.
#               Best choice if your music stays on Linux and you value
#               keeping the original artist/title characters intact.
#
#  macos        Adds : вҶ’ - (HFS+/APFS uses : as its internal separator).
#
#  windows      Full set of NTFS-illegal characters, suitable for Samba/NAS
#               shares accessed from Windows or for files you copy to Windows.
#
#  unicode_to_ascii   Transliterates common non-ASCII letters to ASCII
#               equivalents.  Useful for players or devices that are
#               ASCII-only.  Can be combined with another profile via INI
#               overrides.
#
# You can add your own profile below and reference it by name.
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

profiles:

  # в”Җв”Җ Linux / ext4 / btrfs в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Only / and null bytes are truly invalid on Linux.  Keep everything else.
  linux: {}


  # в”Җв”Җ macOS / HFS+ / APFS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  macos:
    ":": "-"          # HFS+ path separator (shown as / in Finder)


  # в”Җв”Җ Windows / NTFS, or Samba/NAS shares accessed from Windows в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  windows:
    ":":  "-"         # NTFS path separator
    "?":  ""          # NTFS wildcard
    "*":  ""          # NTFS wildcard
    '"':  "'"          # NTFS illegal
    "<":  "("          # NTFS illegal
    ">":  ")"          # NTFS illegal
    "|":  "-"          # NTFS pipe / illegal
    "\\":  "-"        # Windows path separator
    # Trailing periods/spaces are also illegal on Windows, but those are
    # handled separately by the rstrip('.') call in get_clean_filename.


  # в”Җв”Җ Unicode вҶ’ ASCII transliteration в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Uncomment the entries you want, or create a custom profile that includes
  # them.  Sorted by Unicode block for readability.
  #
  # unicode_to_ascii:
  #   # Latin Extended-A (common Western European)
  #   "ГҖ": "A"    # ГҖ
  #   "ГҒ": "A"    # ГҒ
  #   "ГӮ": "A"    # ГӮ
  #   "Гғ": "A"    # Гғ
  #   "Г„": "Ae"   # Г„  (German convention)
  #   "Г…": "A"    # Г…
  #   "ГҶ": "AE"   # ГҶ
  #   "ГҮ": "C"    # ГҮ
  #   "ГҲ": "E"    # ГҲ
  #   "Гү": "E"    # Гү
  #   "ГҠ": "E"    # ГҠ
  #   "ГӢ": "E"    # ГӢ
  #   "ГҢ": "I"    # ГҢ
  #   "ГҚ": "I"    # ГҚ
  #   "ГҺ": "I"    # ГҺ
  #   "ГҸ": "I"    # ГҸ
  #   "Гҗ": "D"    # Гҗ
  #   "Г‘": "N"    # Г‘
  #   "Г’": "O"    # Г’
  #   "Г“": "O"    # Г“
  #   "Г”": "O"    # Г”
  #   "Г•": "O"    # Г•
  #   "Г–": "Oe"   # Г–  (German convention)
  #   "Гҳ": "O"    # Гҳ
  #   "Гҷ": "U"    # Гҷ
  #   "Гҡ": "U"    # Гҡ
  #   "Гӣ": "U"    # Гӣ
  #   "Гң": "Ue"   # Гң  (German convention)
  #   "Гқ": "Y"    # Гқ
  #   "Гһ": "Th"   # Гһ
  #   "Гҹ": "ss"   # Гҹ
  #   "Г ": "a"    # Г 
  #   "ГЎ": "a"    # ГЎ
  #   "Гў": "a"    # Гў
  #   "ГЈ": "a"    # ГЈ
  #   "ГӨ": "ae"   # ГӨ  (German convention)
  #   "ГҘ": "a"    # ГҘ
  #   "ГҰ": "ae"   # ГҰ
  #   "Г§": "c"    # Г§
  #   "ГЁ": "e"    # ГЁ
  #   "Г©": "e"    # Г©
  #   "ГӘ": "e"    # ГӘ
  #   "Г«": "e"    # Г«
  #   "Г¬": "i"    # Г¬
  #   "Гӯ": "i"    # Гӯ
  #   "Г®": "i"    # Г®
  #   "ГҜ": "i"    # ГҜ
  #   "Г°": "d"    # Г°
  #   "Гұ": "n"    # Гұ
  #   "ГІ": "o"    # ГІ
  #   "Гі": "o"    # Гі
  #   "Гҙ": "o"    # Гҙ
  #   "Гө": "o"    # Гө
  #   "Г¶": "oe"   # Г¶  (German convention)
  #   "Гё": "o"    # Гё
  #   "Г№": "u"    # Г№
  #   "Гә": "u"    # Гә
  #   "Г»": "u"    # Г»
  #   "Гј": "ue"   # Гј  (German convention)
  #   "ГҪ": "y"    # ГҪ
  #   "Гҫ": "th"   # Гҫ
  #   "Гҝ": "y"    # Гҝ
  #   # Typographic punctuation
  #   "вҖҳ": "'"    # ' left single quotation mark  вҶ’ straight apostrophe
  #   "вҖҷ": "'"    # ' right single quotation mark вҶ’ straight apostrophe
  #   "вҖң": '"'    # " left double quotation mark  вҶ’ straight quote
  #   "вҖқ": '"'    # " right double quotation mark вҶ’ straight quote
  #   "вҖ“": "-"    # вҖ“ en dash
  #   "вҖ”": "-"    # вҖ” em dash
  #   "вҖҰ": "..."  # вҖҰ ellipsis


  # в”Җв”Җ Personal / custom preference в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Copy this block into your own profile name and uncomment what you want.
  #
  # personal:
  #   "'":  ""         # strip straight apostrophe
  #   "вҖҷ":  ""         # strip curly apostrophe
  #   ",":  ""         # strip commas
  #   "&":  " and "    # ampersand вҶ’ "and"
  #   " ":  "_"        # spaces вҶ’ underscores (combine with {space}=_ in INI)
