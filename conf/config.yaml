# ─────────────────────────────────────────────────────────────────────────────
# massMusicTagger — shared default configuration
# ─────────────────────────────────────────────────────────────────────────────
#
# Contains only settings that are not specific to any metadata source.
# Source-specific defaults live in their own named files:
#   conf/discogs.yaml       — Discogs API settings
#   conf/musicbrainz.yaml   — MusicBrainz API settings
#
# Usage: create conf/config_personal.yaml (gitignored) with your overrides,
# and list extra files to load via extra_configs:
#
#   extra_configs:
#     - conf/discogs_personal.yaml
#     - conf/musicbrainz_personal.yaml
#     - conf/formats_personal.ini
#
# massMusicTagger loads this file first, then any extra_configs in order.

# ─────────────────────────────────────────────────────────────────────────────
common:
# ─────────────────────────────────────────────────────────────────────────────

  user_agent: "massMusicTagger/1.0 +https://github.com/sjbrownrigg/massMusicTagger"
  formats_file: ""
  source_dir: ""
  dest_dir: ""
  watch_poll_interval: 30


# ─────────────────────────────────────────────────────────────────────────────
source:
# ─────────────────────────────────────────────────────────────────────────────
#
# 'priority' is an ordered list of sources to try for each album.
# Sources are tried left-to-right; the first confident match wins.
#
# Built-in source names:
#   discogs        — Discogs API (requires user_token in [discogs])
#   musicbrainz    — MusicBrainz API (requires user_agent in [musicbrainz])
#   local          — local JSON fixture (for testing)
#   existing_tags  — read metadata already embedded in the audio files;
#                    used as a fallback to organise albums without any
#                    database match.  No API calls are made; no new tags
#                    are written — files are only renamed/moved.
#
# Examples:
#   priority: [discogs]                                # Discogs only
#   priority: [musicbrainz, discogs]                  # MB first, Discogs fallback
#   priority: [discogs, musicbrainz, existing_tags]   # full cascade with fallback

  priority:
    - discogs
    - musicbrainz
    - existing_tags

  # The following keys are kept for backward compatibility with discogstagger3.
  # 'name' is still accepted: it maps to a single-element priority list.
  discogs: discogs_id
  amg:     amg_id
  local:   discogs_id
  name:    discogs    # legacy — overridden by 'priority' when both present


# Source-specific settings live in their own named files (all in conf/):
#   conf/discogs.yaml       — Discogs API defaults
#   conf/musicbrainz.yaml   — MusicBrainz API defaults
#
# Load them (and your personal credential files) via extra_configs in your
# personal config.  Example conf/config_personal.yaml:
#
#   extra_configs:
#     - conf/discogs.yaml
#     - conf/musicbrainz.yaml
#     - conf/discogs_personal.yaml
#     - conf/musicbrainz_personal.yaml


# ─────────────────────────────────────────────────────────────────────────────
batch:
# ─────────────────────────────────────────────────────────────────────────────

  id_file: id.txt
  searchdiscogs: false
  tracklength_tolerance: 5.0
  title_similarity_threshold: 60

  # Number of concurrent worker threads for mass processing.
  # Set to 1 for sequential processing (required for --review mode).
  workers: 1

  # Path to the JSON audit log (append-only).  Records every processed
  # directory with outcome, source used, matched release, and elapsed time.
  audit_log: "~/.cache/massmusictagger/audit.json"


# ─────────────────────────────────────────────────────────────────────────────
details:
# ─────────────────────────────────────────────────────────────────────────────

  keep_original: true
  embed_coverart: true
  image_policy: prefer_larger
  char_profile: linux
  char_substitutions: conf/char_substitutions.yaml
  format_codes: conf/format_codes.yaml
  path_sep_replacement: ""
  control_replacement: ""
  use_style: false
  keep_tags: freedb_id
  case_dir:     lower
  case_disc:    lower
  case_song:    lower
  case_va_song: lower
  case_nfo:     lower
  case_m3u:     lower
  use_folder_jpg: true
  use_anv: true
  join_artists: ""

  # Preferred source for cover art, independent of the metadata source.
  #
  #   auto         — use whichever source provided the metadata (default)
  #   discogs      — always use Discogs images
  #   musicbrainz  — always use Cover Art Archive images; if the metadata came
  #                  from Discogs, attempt a barcode-based MBID lookup first
  #
  # MusicBrainz Cover Art Archive advantages:
  #   • Images are explicitly typed (Front, Back, Medium/disc label, Booklet, …)
  #   • Often higher resolution (no size cap like Discogs)
  #   • Community-curated; approved flag filters out poor submissions
  image_source: auto
  split_discs_folder: false
  split_discs: false
  split_discs_extension: '" (disc%DISNO%)"'
  copy_other_files: false
  done_file: dt.done
  variousartists: Various
  download_only_cover: true


# ─────────────────────────────────────────────────────────────────────────────
cue:
# ─────────────────────────────────────────────────────────────────────────────

  cue_done_dir: .cue
  parse_cue_files: false


# ─────────────────────────────────────────────────────────────────────────────
tags:
# ─────────────────────────────────────────────────────────────────────────────

  encoder: ""


# ─────────────────────────────────────────────────────────────────────────────
suppress_tags:
# ─────────────────────────────────────────────────────────────────────────────


# ─────────────────────────────────────────────────────────────────────────────
replaygain:
# ─────────────────────────────────────────────────────────────────────────────

  add_tags: true
  application: r128gain


# ─────────────────────────────────────────────────────────────────────────────
cache:
# ─────────────────────────────────────────────────────────────────────────────

  directory: ""


# ─────────────────────────────────────────────────────────────────────────────
logging:
# ─────────────────────────────────────────────────────────────────────────────

  level: 20
  config_file: ""

  # Path to a persistent log file.  Leave empty to log to the terminal only.
  # The directory is created automatically if it does not exist.
  # Example: log_file: "~/.cache/massmusictagger/mmt.log"
  log_file: ""
