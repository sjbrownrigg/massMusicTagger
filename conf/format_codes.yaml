# discogstagger3 — Discogs format code rules
#
# Computes a compact format code (e.g. LP, CD, CDS, 12″M, LCDS, 2xCD)
# from the three format fields Discogs provides:
#
#   format.name          Vinyl, CD, Cassette, File, …
#   format.descriptions  Album, Single, Limited Edition, 12", …
#   disctotal            number of records/discs in the release
#
# The code is built in three steps:
#
#   1. base_formats     map format.name to a short code (LP, CD, file, …)
#   2. vinyl_sizes      if format is Vinyl and a size description is present,
#                       the size overrides "LP" (12″, 7″, 10″)
#   3. quantity         disctotal > 1 prepends a multiplier (D for 2, 3x, 4x…)
#
# Release type (Single, EP, Compilation) and edition qualifiers are NOT part of
# the format code — use %releasetype% and %edition% in your format strings:
#
#   [%format_code% %releasetype% codec-quality]
#   → [CD Single flac-lossless-44s]
#   → [DLP Album flac-lossless-44s]
#
# The inch mark (") in vinyl sizes is replaced with the double prime (″, U+2033)
# which is safe in all common filesystem path names.
#
# ─────────────────────────────────────────────────────────────────────────────

# ── Step 1: base format name → code ──────────────────────────────────────────

base_formats:
  Vinyl:      LP
  CD:         CD
  CDr:        CDr
  Cassette:   MC
  File:       DM # Digital Media - streaming / download releases (Bandcamp, etc.)
  Digital Media: DM
  Web:        DM       # streaming / download releases (Bandcamp, etc.)
  SACD:       SACD
  Blu-ray:    BD
  DVD:        DVD
  DVD-Video:  DVD
  VHS:        VHS
  Laserdisc:  LD
  MiniDisc:   MD
  DAT:        DAT
  DCC:        DCC
  Betamax:    Beta
  Shellac:    SP       # 78 RPM shellac records
  Flexi-disc: Flexi
  Acetate:    Lacquer
  # Catch-all: any format not listed here uses the raw Discogs name


# ── Step 2: vinyl size descriptions (only applied when base_format = "Vinyl") ─
# vinyl_sizes:            applied unconditionally (7", 10" are non-standard sizes
#                         that always communicate useful information).
# vinyl_sizes_conditional: applied only when a non-album release type is present.
#                         12" is the standard LP size, so 12" + Album = LP.
# vinyl_non_album_types:  descriptions that trigger the conditional sizes.

vinyl_sizes:
  7":   7″     # ″ = double prime U+2033  (safe in filenames)
  10":  10″

vinyl_sizes_conditional:
  12":  12″    # 12" Single/EP/Maxi-Single → 12″; 12" Album → LP

vinyl_non_album_types:
  - Single
  - EP
  - Maxi-Single
  - Mini-Album


# ── Step 3: quantity ─────────────────────────────────────────────────────────
# Applied when disctotal > 1 — multi-disc is a physical property worth encoding.
#
# Type (Single, EP, Compilation) and edition (Limited Edition) are no longer
# encoded here.  Use %releasetype% and %edition% in your format strings:
#
#   [%format_code% %releasetype% flac-lossless-44s]
#   → [CD Single flac-lossless-44s]   (1 disc)
#   → [DCD Album flac-lossless-44s]   (2 discs)
#
# Examples:  D + CD = DCD,  3x + LP = 3xLP

quantity_aliases:
  2: D    # Double:  DLP, DCD
  # 3: T  # Triple  (uncomment if you prefer T over "3x")

quantity_format: "{n}x"   # format for quantities without an alias: 3x, 4x, …


# ── Ignored descriptions ─────────────────────────────────────────────────────
# These appear in Discogs data but carry no useful information for the format
# code.  Listing them here avoids any future "unrecognised" logging if that
# is ever added.

ignored:
  - 33 ⅓ RPM
  - 45 RPM
  - 78 RPM
  - Stereo
  - Mono
  - Remastered
  - Reissue
  - Repress
  - Compilation        # informational; not part of the format code
  - Club Edition
  - Promo              # already a suffix; ignore at the ignored-pass
  - Enhanced           # enhanced CD (data track) — not a format modifier
  - Mispress
  - Test Pressing
  - Advance
  - Transcription


# ── Release type mapping (Discogs → MusicBrainz style) ───────────────────────
# Maps Discogs format descriptions to MusicBrainz release types.
# Matching is case-insensitive.  Add your own mappings as needed.
#
# primary: override the default "Album" primary type
# secondary: add to the secondary type list (all that match are included)
# format_name_primary: Discogs format.name → primary type override
#
# The resulting album.release_type (primary) and album.release_types (all) are
# written to the releasetype tag and available as %releasetype% in format strings.
#
# Example: a Discogs release with descriptions ["Compilation", "Live"]
# → release_type = "Album", release_types = ["Album", "Compilation", "Live"]

release_type_map:
  primary:
    Single:       Single
    Maxi-Single:  Maxi-Single
    EP:           EP
    Mini-Album:   EP

  format_name_primary:
    7":          Single     # vinyl singles
    10":         Single
    Flexi-disc:  Single
    Shellac:     Single     # 78 RPM singles

  secondary:
    Compilation:       Compilation
    Live:              Live
    Remix:             Remix
    Remixes:           Remix
    Soundtrack:        Soundtrack
    Cast Recording:    Soundtrack
    DJ Mix:            DJ-mix
    Mixtape:           Mixtape/Street
    Demo:              Demo
    Interview:         Interview
    Spokenword:        Spokenword


# ── Edition qualifiers ────────────────────────────────────────────────────────
# These descriptions name a release as a particular edition and are displayed
# alongside the album title — e.g. "[2012] The Young Gods (Deluxe Edition)"
# — rather than being folded into the format code bracket.
#
# Use the %edition% variable in your dir format string:
#   %album%$if1($strcmp('%edition%',''),'', ' \(%edition%\)')
#
# The FIRST matching description in this list wins.

editions:
  - Deluxe Edition       # also matches "Super Deluxe Edition", "Deluxe Anniversary Edition", …
  - Ultimate Edition
  - Collector's Edition
  - Expanded Edition
  - Anniversary Edition  # also matches "30th Anniversary Edition", "25th Anniversary", …
  - Special Edition
