# ─────────────────────────────────────────────────────────────────────────────
# discogstagger3 — personal format strings (sjb)
# ─────────────────────────────────────────────────────────────────────────────
#
# Loaded via formats_file: conf/formats_personal.ini in conf/config_personal.yaml.
# Overrides conf/formats.ini.
#
# See docs/tagging_reference.md for the full variable and function reference.

[file-formatting]

nfo = %albumartist% - %album%.nfo
m3u = %albumartist% - %album%.m3u

# ── Directory naming ──────────────────────────────────────────────────────────
#
# Pattern:
#   Artist/[Date] Album (Edition) (CatNo) [Format Type codec-quality-samplerate]
#
# Format and Type are now separate fields (harmonised with MusicBrainz):
#   %format_code%  = physical medium (CD, LP, 7″, DCD, file, …)
#   %releasetype%  = release type   (Album, Single, EP, Compilation, …)
#
# The date brackets are omitted entirely when no date is available.
# Album type is suppressed in format_desc (shown only for non-Album types).
#
# Examples:
#   Clan of Xymox/[2004] Darkest Hour [CD flac-lossless-44s]
#   Julien-K/[2008-09-30] Look at U (CF002) [2xfile Single flac-lossless-44s]
#   Stray/[2012] Holding On [DCD flac-lossless-44s]
#   The Young Gods/[2012] The Young Gods (Deluxe Edition) [DCD flac-lossless-44s]
#   Front 242/[1992] Masterhit [11xfile flac-lossless-44s]
#   deadmau5/[2011] The Remixes (CUBRIKCD004) [27xfile Compilation flac-lossless-44s]
#
dir = $ifeq('%albumartist%','Various','Various Artists','%albumartist%')/$wrap('%releasedate%','[','] ')%album%$wrap('%edition%',' \(','\)')$wrap($flatten('%catnos%',0,''),' \(','\)') [%__format_desc__% $lower('%codec%')-%quality%$ifeq('%quality%','lossless',$ifequal(%bitdepth%,24,'-24',''),'')-$substr('%samplerate%','','-3')$ifeq('%channels%','stereo','s','%channels%')]

# ── Track naming ──────────────────────────────────────────────────────────────
#
# Single-artist:   01 Title.flac
# Various-artists: 01 Artist - Title.flac
#
song    = $num('%tracknumber%','2') $if1($neg($strcmp('%artist%','%albumartist%')),'%artist% - ')%title%%fileext%
va_song = $num('%tracknumber%','2') $if1($neg($strcmp('%artist%','%albumartist%')),'%artist% - ')%title%%fileext%

# ── Other ─────────────────────────────────────────────────────────────────────

image = image

# Disc subdirectory naming for multi-disc releases.
# The disc number is always appended by the code.
; Multi-disc subdirectory naming.
; Vinyl releases use "Disk N" (physical record), everything else uses "CD N".
discs = $ifgreater('%disctotal%', 1, $ieq('%format%','vinyl','Disk','CD')+' '+$num('%discnumber%','1'),'')$wrap('%discsubtitle%',', ')


[custom-variables]
; ── Building blocks ───────────────────────────────────────────────────────────
;
; Fine-grained components for assembling any format code you like.
; Combine them in format_desc or directly in the dir format string.
;
; Available standard variables (for reference):
;   %format%         raw format name:  CD, Vinyl, Digital Media, CDr, …
;   %format_base%    medium abbreviation without quantity:  CD, LP, 12″, CDr, file
;   %format_code%    medium + quantity:  CD, DCD, 3xLP, 12″, file
;   %releasetype%    MB-style type:  Album, Single, EP, Compilation, Live, …
;   %edition%        edition qualifier:  Deluxe Edition, Limited Edition, …
;   %disctotal%      number of physical discs
;   %trackcount%     total track count across all discs
;   %digital%        '1' for File/Web/Digital Media, '' for physical

; Edition prefix — L (Limited Edition) and/or # (Numbered).
; Checks %format_description% which carries Discogs descriptors for both sources.
prefix = $if1($inarray('%format_description%','Limited Edition'),'L','')$if1($inarray('%format_description%','Numbered'),'#','')

; Box Set indicator — 'B' when %format_names% includes 'Box Set', else ''.
; %format_names% is a JSON array of all Discogs format type names in the release.
; Box Set is detected from the format entry names, not from descriptions.
box = $if1($inarray('%format_names%','Box Set'),'B','')

; Physical medium abbreviation: CD, LP, 12″, CDr, file, …
; %format_base% gives this directly (compute_format_code with disctotal=1).
medium = %format_base%

; Quantity prefix — disc count for physical, track count for digital.
;   Physical: ''=single, D=double, 3x=triple, …
;   Digital:  always trackcount (2x, 10x, 27x, …)
qty = $if1('%digital%','%trackcount%x',$switch('%disctotal%','1','','2','D','%disctotal%x'))

; Release type abbreviation for the format bracket.
;   S  = Single         M  = Maxi-Single
;   EP = EP             Compilation, Live, Remix shown in full; Album suppressed.
; Vinyl sizes 7″ and 12″ already communicate "Single" — the S suffix is
; suppressed for those combinations to avoid redundancy (7″S → 7″, 12″S → 12″).
; Maxi-Single keeps M even on 12″ because it distinguishes from a plain Single.
; Short codes (S, M, EP) attach directly to the format code (14xBCDS, 12″M).
; Longer type names (Compilation, Live, Remix) get a space prefix so they
; read cleanly: 27xDM Compilation, DCD Live.
type_abbr = $if1($neg($all($any($strcmp('%format_base%','7″'),$strcmp('%format_base%','10″'),$strcmp('%format_base%','12″')),$strcmp('%releasetype%','Single'))),$switch('%releasetype%','Single','S','Maxi-Single','M','EP','EP','Album','',' %releasetype%'))

; ── Assembled format description ──────────────────────────────────────────────
;
; IMPORTANT: custom variables that expand to $function() calls must NOT be
; wrapped in single quotes — single quotes make the expansion a string literal
; rather than code, breaking eval().  Use bare %__varname__% not '%__varname__%'.
;
; Results:
;   CD Album:                        CD
;   CD Single:                       CDS        (CD needs the S)
;   Limited CDr Maxi-Single:         LCDrM
;   DLP Album:                       DLP
;   7″ Single:                       7″         (size implies Single — S dropped)
;   7″ Maxi-Single:                  7″M        (M kept — distinguishes from Single)
;   7″ EP:                           7″EP       (EP not implied by size)
;   12″ Single:                      12″        (size implies Single — S dropped)
;   12″ Maxi-Single:                 12″M       (M kept — distinguishes from Single)
;   12″ EP:                          12″EP      (EP not implied by size)
;   LP Album:                        LP
;   Digital Single (2 tracks):       2xDMS      (DM needs the S)
;   Digital Compilation (27 tracks): 27xDM Compilation
;   Bootleg LP:                      LP.B
;   Promo CD Single:                 CDS.P
;
; Release status suffix: B=Bootleg, P=Promo/Promotional, blank for Official.
; Promo covers both Discogs "Promo" and MB "Promotional" (normalised to "Promo").
status_abbr = $iswitch('%status%','bootleg','B','promo','P','')

; Note: %__qty__% is NOT in quotes — it expands to a $if1() call (code, not string)
; %__box__% sits between quantity and medium: 14x + B + CD → 14xBCDS
; type_abbr handles its own space for long names (Compilation, Live) and
; returns '' for Album (suppressed) — no separate wrapper needed here.
format_desc = %__prefix__%$if1('%digital%','%trackcount%x',%__qty__%)%__box__%%__medium__%$if1($neg($strcmp('%releasetype%','Album')),%__type_abbr__%)%__status_abbr__%