# discogstagger3 — file naming format strings
#
# Format strings use Foobar2000-style %variable% and $function() syntax.
# See docs/tagging_reference.md for the full variable and function reference.
#
# This file is intentionally kept in INI format: the $function()/%variable%
# syntax contains characters ($, %, \, ') that would require awkward quoting
# in YAML.  Everything else lives in conf/config.yaml.
#
# To use your own format strings, copy this file and reference the copy
# explicitly in your personal YAML config:
#
#   common:
#     formats_file: conf/my_formats.ini

[file-formatting]
# These are the default format strings.  Override them in your personal
# YAML config's companion formats file (e.g. myconfig_formats.ini).
# See docs/tagging_reference.md for the full variable and function reference.

nfo     = %albumartist% - %album%.nfo
m3u     = %albumartist% - %album%.m3u
dir     = %albumartist%-%album%-(%catno%)-%year%
song    = $num('%tracknumber%','2')-%artist%-%title%%fileext%
va_song = $num('%tracknumber%','2')-%artist%-%title%%fileext%
image   = image
discs   = $if1($strcmp('%totaldiscs%',''),'',$ifgreater('%totaldiscs%', 1, 'CD %discnumber%',''))$if1($strcmp('%disctitle%',''),'',', %disctitle%')


# ─────────────────────────────────────────────────────────────────────────────
# [custom-variables] — reusable format string fragments
# ─────────────────────────────────────────────────────────────────────────────
#
# Define named shorthand expressions here and reference them in any
# [file-formatting] string using the %__varname__% notation
# (double-underscore prefix and suffix distinguishes custom variables
# from standard variables like %albumartist%).
#
# A custom variable value is itself a format string: it may contain
# standard %variables%, $functions(), and literal text.  The value is
# expanded inline before the surrounding format string is evaluated, so
# the final result has access to the full variable/function set.
#
# Rules
# ─────
#   • Names are case-insensitive  (%__FMT__% and %__fmt__% are identical)
#   • Custom variables may reference standard variables (%format%, %year%, …)
#   • Custom variables MAY reference other custom variables (up to 5 levels deep)
#   • Unknown %__names__% are left unchanged (no error)
#   • IMPORTANT: if a variable's value contains $function() calls, do NOT wrap
#     %__varname__% in single quotes when passing it to another $function().
#     Single quotes turn the expansion into a string literal (not code) and
#     break eval().  Write  %__varname__%  not  '%__varname__%'  in that case.
#
# Examples
# ────────
# A compact format code that appends a type suffix:
#
#   fmt_code = %format_code%$if1($strcmp('%releasetype%','Single'),'S','')
#
# Use it in the dir format string:
#
#   dir = %albumartist%/[%releasedate%] %album% (%catno%) [%__fmt_code__%]
#   → Diorama/[2020-10-23] Tiny Missing Fragments (A 147) [CD]
#   → deadmau5/[2011-11-07] The Remixes (CUBRIKCD004) [file S]
#
# A quality-and-format description string:
#
#   media_detail = %format% $lower('%codec%')-%quality%
#
# Then in dir:
#
#   dir = %albumartist%/[%year%] %album% [%__media_detail__%]
#
# ─────────────────────────────────────────────────────────────────────────────
[custom-variables]
# Add your own variables below, one per line:
#
#   varname = value with %standard% $variables() and text
#
# %digital% — '1' for digital formats (Discogs: File/Web; MB: Digital Media), '' for physical.
# Use it to prepend the track count for digital releases without enumerating format names:
#
#   format_desc = $if1('%digital%','%trackcount%x','')%format_code%
#   → 2xfileS  (2-track digital single)
#   → CD       (physical CD, no count prefix)
#
# Note: using $inarray('["File","Web"]','%format%') misses MB's 'Digital Media' format.
# %digital% handles all three automatically.
#
# Example — append release type suffix to the format code:
# fmt_code = %format_code%$if1($strcmp('%releasetype%','Single'),'S','')$if1($strcmp('%releasetype%','EP'),'EP','')
