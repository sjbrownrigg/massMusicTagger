# ─────────────────────────────────────────────────────────────────────────────
# massMusicTagger — MusicBrainz source defaults
# ─────────────────────────────────────────────────────────────────────────────
#
# This file is loaded automatically when 'musicbrainz' is in source.priority.
# Override by creating conf/musicbrainz_personal.yaml (gitignored) and listing
# it in your config_personal.yaml under extra_configs.

musicbrainz:
  # Required: user-agent identifying your application to the MB API.
  # Format: "AppName/Version (contact@example.com)"
  user_agent: "massMusicTagger/1.0 (your@email.com)"

  # AcoustID API key for tier 6/7 audio fingerprinting.
  # Register at https://acoustid.org/login
  # Leave empty to skip AcoustID tiers.
  acoustid_api_key: ""

  # Disk cache directory.  All cache layers live under this root:
  #   releases/   — full release JSON (incl. track listings)
  #   caa/        — Cover Art Archive image index per release
  #   images/     — downloaded CAA image files (keyed by URL hash)
  #   searches/   — text and barcode search results (keyed by query hash)
  cache_directory: "~/.cache/massmusictagger/mb"

  # Cache control — set any flag to false to always re-fetch that layer.
  # Useful when you want to pick up updated metadata without clearing the
  # whole cache: set cache_metadata: false for one run, then re-enable.
  cache_metadata: true   # release JSON + CAA image index
  cache_images:   true   # downloaded Cover Art Archive image files
  cache_search:   true   # text search and barcode search result MBIDs
