# ─────────────────────────────────────────────────────────────────────────────
# massMusicTagger — MusicBrainz sample configuration
# ─────────────────────────────────────────────────────────────────────────────
#
# DO NOT edit, rename, or delete this file — it is the reference template.
# Installation: copy to conf/musicbrainz.yaml and fill in your credentials.
# conf/musicbrainz.yaml is gitignored — never commit credentials.
# List it in conf/config.yaml under extra_configs:
#
#   extra_configs:
#     - conf/musicbrainz.yaml

musicbrainz:
  # Required: user-agent identifying your application to the MB API.
  # Format: "AppName/Version (contact@example.com)"
  user_agent: "massMusicTagger/1.0 (your@email.com)"

  # AcoustID API key for tier 6/7 audio fingerprinting.
  # Register at https://acoustid.org/login
  # Leave empty to skip AcoustID tiers.
  acoustid_api_key: ""

  # Run AcoustID fingerprinting before text search (tiers 6-7 are skipped
  # when this fires).  Costs fpcalc CPU + AcoustID network call on every
  # album; most effective for popular artists where title scoring is
  # unreliable.  Requires acoustid_api_key.
  acoustid_early: false

  # source_hints_file is now under [details] in config.yaml (shared by all sources).
  # Set details.source_hints_file: "" to disable, or override the path here
  # (musicbrainz.source_hints_file takes precedence over details.source_hints_file).
  # source_hints_file: ""

  # Disk cache directory.  All cache layers live under this root:
  #   releases/   — full release JSON (incl. track listings)
  #   caa/        — Cover Art Archive image index per release
  #   images/     — downloaded CAA image files (keyed by URL hash)
  #   searches/   — text and barcode search results (keyed by query hash)
  cache_directory: "~/.cache/massmusictagger/mb"

  # Delay between Cover Art Archive requests (seconds).
  # The Internet Archive applies IP-based rate limits; a small pause keeps
  # requests within safe bounds and prevents your IP being throttled.
  # Increase if you see "rate-limited (429)" warnings in the log.
  # Set to 0 to disable (only safe when batch.workers = 1 and cache is warm).
  caa_request_delay: 0.5
