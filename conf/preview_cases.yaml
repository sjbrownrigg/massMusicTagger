# Format string preview test cases.
# Run: python format_preview.py [--watch]
#
# format_strings: what to evaluate for each case.
#   - Section names from [file-formatting] (dir, song, va_song, nfo, m3u)
#   - Raw format strings: "%albumartist%/[%year%] %album%"
#   - Custom variable references: "%__format_desc__%"
#
# cases: metadata values to inject.
#   Required: name, format, descriptions, artist, title, year
#   Optional: catno, label, disctotal (default 1), status (default Official),
#             source (default discogs), releasetype (default Album),
#             is_compilation (default false), track_title, disc_title,
#             codec (default flac), quality, genres, styles

format_strings:
  - dir
  - song
  - "%__format_desc__%"
  - "%__type_abbr__%"
  - discs

cases:
