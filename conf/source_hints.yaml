# Folder-name keywords used to infer the likely source format or edition
# before making API calls.  Matching is case-insensitive substring search on
# the source folder's basename.
#
# digital / vinyl — hard format gate: releases whose medium type conflicts
#   with the detected hint are rejected outright in _compareRelease().
#   Only use keywords that unambiguously imply a specific medium.
#
# descriptor_boost — soft scoring signal: when a keyword is matched,
#   Discogs candidates whose descriptions contain a matching keyword receive
#   a score bonus, improving their rank without rejecting non-matching ones.
#   Use for edition/mastering qualifiers that apply across medium types
#   (e.g. "Remastered" is equally valid on CD or vinyl).
#
# Override by creating conf/source_hints_personal.yaml (gitignored)
# and pointing details.source_hints_file at it.

source_hints:
  digital:
    - "24 Bit"
    - "24bit"
    - "24-Bit"
    - "WEB"
    - "Hi-Res"
    - "Hi Res"
    - "HDTRACKS"
    - "96kHz"
    - "88.2kHz"
    - "192kHz"
  vinyl:
    - "Vinyl Rip"
    - "VinylRip"
    - "Needle Drop"
    - "Phono"
  descriptor_boost:
    - "Remaster"
    - "Remastered"
    - "Live"
    - "Deluxe"
