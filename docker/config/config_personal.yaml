# ─────────────────────────────────────────────────────────────────────────────
# massMusicTagger — Docker personal configuration
# ─────────────────────────────────────────────────────────────────────────────
#
# Copy this file to your CONFIG_DIR on the NAS (the directory bound to /config
# in the container) and customise the values below.
#
# The massMusicTagger default configs are bundled in the image at /app/conf/.
# extra_configs loads them first (lowest priority) then overlays your personal
# settings and credentials (highest priority).

extra_configs:
  - /app/conf/config.yaml              # massMusicTagger baseline defaults
  - /app/conf/discogs.yaml             # Discogs source defaults
  - /app/conf/musicbrainz.yaml         # MusicBrainz source defaults
  - /config/discogs_personal.yaml      # Your Discogs credentials
  - /config/musicbrainz_personal.yaml  # Your MusicBrainz/AcoustID settings
  - /config/formats_personal.ini       # Optional: custom format strings

# ─────────────────────────────────────────────────────────────────────────────
common:
# ─────────────────────────────────────────────────────────────────────────────

  user_agent: "massMusicTagger/1.0 +https://github.com/sjbrownrigg/massMusicTagger"
  source_dir: /music/incoming      # subdirectory inside your MUSIC_DIR mount
  dest_dir:   /music/sorted        # subdirectory inside your MUSIC_DIR mount
  watch_poll_interval: 30          # seconds between polls (NFS-safe polling)

# ─────────────────────────────────────────────────────────────────────────────
source:
# ─────────────────────────────────────────────────────────────────────────────

  # Try Discogs first (id.txt or search), then MusicBrainz, then organise from
  # existing tags if neither API returns a confident match.
  priority:
    - discogs
    - musicbrainz
    - existing_tags

# ─────────────────────────────────────────────────────────────────────────────
details:
# ─────────────────────────────────────────────────────────────────────────────

  keep_original: true
  embed_coverart: true
  image_policy: prefer_larger
  image_source: musicbrainz

  # Windows/Samba profile: replaces characters illegal on NTFS/SMB shares
  char_profile: windows
  char_substitutions: conf/char_substitutions.yaml
  format_codes: conf/format_codes.yaml

  # Replace embedded slashes with hyphens rather than removing them
  path_sep_replacement: "-"
  control_replacement: ""

  use_style: false
  keep_tags: freedb_id

  # Preserve original capitalisation for all path segments
  case_dir:     preserve
  case_disc:    preserve
  case_song:    preserve
  case_va_song: preserve
  case_nfo:     preserve
  case_m3u:     preserve

  use_folder_jpg: true
  use_anv: false           # use canonical Discogs name, not sleeve credit variant

  # Move source directory to archive after successful tagging
  source_action: move
  # Must be a path under /music — it's the only host-mounted directory.
  # "~/Music/archive" resolves to /root/Music/archive inside the container,
  # which is NOT bind-mounted and is lost on container recreation.
  source_archive_dir: "/music/archive"
  source_move_template: "%source%/%albumartist%/%current_folder%"

  variousartists: "Various Artists"

  split_discs_folder: true
  split_discs: true
  split_discs_extension: '" (disc%DISNO%)"'

  copy_other_files: true
  done_file: .done
  download_only_cover: false

# ─────────────────────────────────────────────────────────────────────────────
cue:
# ─────────────────────────────────────────────────────────────────────────────

  # Subdirectory where processed CUE sheets and source images are stashed.
  # This directory is excluded from subsequent directory scans.
  cue_done_dir: .cue

  # Automatically split CUE+image files found in source directories.
  parse_cue_files: true

# ─────────────────────────────────────────────────────────────────────────────
m4a:
# ─────────────────────────────────────────────────────────────────────────────
# .m4a files may contain either ALAC (lossless) or AAC (lossy) audio.
# These settings control what happens to each before tagging proceeds.

  # Detect and convert .m4a files found in source directories before tagging.
  convert_m4a_files: true

  # ALAC (lossless) handling:
  #   convert_to_flac — transcode losslessly to FLAC (recommended; matches
  #                     the format the rest of the library standardises on)
  #   keep            — leave as .m4a and tag in place
  alac_action: convert_to_flac

  # AAC (lossy) handling — converting lossy audio to FLAC just inflates file
  # size with no quality gain, so that option is intentionally not offered:
  #   keep            — leave as .m4a and tag in place
  #   convert_to_mp3  — re-encode to MP3 (lossy-to-lossy, e.g. for compatibility)
  #   convert_to_ogg  — re-encode to Ogg Vorbis (lossy-to-lossy)
  aac_action: convert_to_ogg

  # Subdirectory where original .m4a files are stashed after a conversion.
  # This directory is excluded from subsequent directory scans.
  m4a_done_dir: .m4a

# ─────────────────────────────────────────────────────────────────────────────
batch:
# ─────────────────────────────────────────────────────────────────────────────

  id_file: id.txt
  searchdiscogs: true
  tracklength_tolerance: 10.0
  title_similarity_threshold: 60
  workers: 2                              # concurrent worker threads
  audit_log: /cache/audit.json            # persisted in the cache volume

# ─────────────────────────────────────────────────────────────────────────────
cache:
# ─────────────────────────────────────────────────────────────────────────────

  directory: /cache/discogs               # Discogs API response cache

# ─────────────────────────────────────────────────────────────────────────────
tags:
# ─────────────────────────────────────────────────────────────────────────────

  encoder: ""

# ─────────────────────────────────────────────────────────────────────────────
replaygain:
# ─────────────────────────────────────────────────────────────────────────────

  add_tags: true
  application: r128gain

# ─────────────────────────────────────────────────────────────────────────────
logging:
# ─────────────────────────────────────────────────────────────────────────────

  level: 20     # 10=DEBUG  20=INFO  30=WARNING
  log_file: ""    # Docker streams stdout — no separate log file needed
  config_file: ""
