# ─────────────────────────────────────────────────────────────────────────────
# massMusicTagger — MusicBrainz settings
# ─────────────────────────────────────────────────────────────────────────────

musicbrainz:
  # Required: identify your application to the MusicBrainz API.
  user_agent: "massMusicTagger/1.0 (your@email.com)"

  # AcoustID API key for audio fingerprinting (Tiers 6 & 7 of MB search).
  # Register at https://acoustid.org/login — free for non-commercial use.
  # Leave empty to disable AcoustID; text search (Tier 3) remains active.
  acoustid_api_key: ""

  # MusicBrainz release cache inside the persistent cache volume.
  cache_directory: /cache/musicbrainz
